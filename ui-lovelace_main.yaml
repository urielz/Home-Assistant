title: Home
icon: 'mdi:home'
panel: true
badges: []
cards:

  # 
  # https://github.com/thomasloven/lovelace-layout-card
  # 
  - type: 'custom:layout-card'
    layout_type: vertical
    max_columns: 3 
    cards:

      # .......................................................................
      # Column 1
      # .......................................................................

      # Weather Forecast Card -------------------------------------------------
      # https://github.com/bramkragten/weather-card
      #
      - type: custom:weather-card 
        entity: weather.bellevue

      # SONOS Media Player ----------------------------------------------------
      # https://github.com/kalkih/mini-media-player
      #
      - type: custom:mini-media-player
        name: SONOS
        entity: media_player.speaker
        artwork: cover
        icon: mdi:music
        source: icon

      # Grid Panel with Switches ----------------------------------------------
      # https://www.home-assistant.io/lovelace/grid/
      #
      - type: grid 
        columns: 3
        square: false
        cards:

          - type: 'custom:button-card'
            entity: switch.sonoff_frontdoor
            icon: mdi:lightbulb 
            color: rgb(255, 255, 102)
            name: Front Door
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px
            state:
              - value: 'on' 
                icon: bha:outdoor-lamp-variant
              - value: 'off'
                icon: bha:outdoor-lamp-variant

          - type: 'custom:button-card'
            entity: climate.heat_pump
            icon: mdi:air-conditioner
            color: rgb(255, 255, 102)
            name: Heat Pump
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px

          - type: 'custom:button-card'
            entity: switch.sonoff_humidifier
            icon: mdi:air-humidifier
            color: rgb(255, 255, 102)
            name: Humidifier
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px

          - type: 'custom:button-card'
            entity: switch.sonoff_freezer
            icon: 'mdi:fridge'
            color: rgb(255, 255, 102)
            name: Freezer
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px

          - type: 'custom:button-card'
            entity: switch.sonoff_fridge
            icon: 'mdi:fridge'
            color: rgb(255, 255, 102)
            name: Fridge
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px              

          - type: 'custom:button-card'
            entity: switch.sonoff_washer
            icon: mdi:washing-machine
            color: rgb(255, 255, 102)
            name: Washer
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px
            hold_action:
              action: more-info              

      #     - type: 'custom:button-card'
      #       entity: light.eb45e14e47084faddcsa7p
      #       icon: mdi:floor-lamp
      #       color: rgb(255, 255, 102)
      #       name: Basement
      #       show_state: true
      #       show_name: true
      #       styles:
      #         card:
      #         - font-size: 11px
      #         - height: 80px
      #       hold_action:
      #         action: more-info


      # Heat Pump Thermostat --------------------------------------------------
      # https://github.com/nervetattoo/simple-thermostat
      #
      - type: custom:simple-thermostat
        entity: climate.heat_pump
        style: |
          ha-card {
            --st-font-size-xl: 22px;
            --st-font-size-m: 22px;
            --st-font-size-title: 22px;
            --st-font-size-sensors: 16px;
            --st-spacing: 4px;
          }

      # Living Room chart (T,P,RH,AH,TD,HI) -----------------------------------
      # https://github.com/custom-cards/button-card
      #
      - type: vertical-stack
        cards:
          - type: "custom:button-card" # Header
            name: Living Room Current Conditions
            styles:
              card:
                - font-size: 16px
      - type: vertical-stack
        cards:                
          - type: horizontal-stack
            cards:
              - type: "custom:button-card" # Temperature
                entity: sensor.living_room_temperature
                icon: mdi:thermometer
                name: Temperature
                show_state: true
                size: 30%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # Heat Index
                entity: sensor.living_room_heatindex
                icon: mdi:thermometer-plus
                name: Heat Index
                show_state: true
                size: 30%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # Dew Point
                entity: sensor.living_room_dewpoint
                icon: mdi:thermometer-lines
                name: Dew Point
                show_state: true
                size: 30%
                styles:
                  card:
                    - font-size: 12px
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: "custom:button-card" # Relative Humidity
                entity: sensor.living_room_humidity
                icon: mdi:water-percent
                name: Humidity
                show_state: true
                size: 30%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # Absolute Humidity
                entity: sensor.living_room_absolutehumidity
                icon: mdi:water
                name: AH (ρv)
                show_state: true
                size: 30%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # Pressure
                entity: sensor.gameroom_pressure
                icon: mdi:gauge
                name: Pressure
                show_state: true
                size: 30%
                styles:
                  card:
                    - font-size: 12px

      - type: custom:layout-break
      
      # .......................................................................
      # Column 2 
      # .......................................................................

      # AirThings Radon Sensor ------------------------------------------------
      # https://github.com/RomRider/apexcharts-card
      #
      - type: custom:apexcharts-card
        apex_config:
          chart:
            height: 200
            zoom:
              enabled: true
            toolbar:
              show: true
          legend:
            show: false
          grid:
            borderColor: '#90A4AE'
            strokeDashArray: 2
        graph_span: 7d
        header:
          show: true
          show_states: true
        yaxis:
          - id: main
            apex_config:
              tickAmount: 4
              decimalsInFloat: 0
          - id: sec
            apex_config:
              tickAmount: 1
            show: 
              false          
        series:         
          - entity: binary_sensor.night
            transform: 'return x === "on" ? 1 : 0;'
            color: grey
            type: area
            curve: stepline
            opacity: 0.5
            stroke_width: 0
            yaxis_id: sec            
            show:
              legend_value: false
              in_header: false
              name_in_header: false
          - entity: sensor.airthings_basement_radonshorttermavg
            name: 'Radon Gas (Rn) :: Gameroom'
            yaxis_id: main
            stroke_width: 1.5
            color: rgb(241,196,15)
            type: area
            opacity: 0.1

      # Temperature Sensors ---------------------------------------------------
      # https://github.com/RomRider/apexcharts-card
      #            
      - type: custom:apexcharts-card
        apex_config:
          chart:
            height: 280
          legend:
            show: true
            fontSize: '10px'
            offsetY: 7
            horizontalAlign: left
          grid:
            borderColor: '#90A4AE'
            strokeDashArray: 2
        graph_span: 3d
        header:
          title: Temperature
          show: true
          show_states: true
          colorize_states: true
        all_series_config:
          curve: smooth
          stroke_width: 1.5
          show:
            legend_value: false
          group_by:
            func: avg
            duration: 20min
        yaxis:
          - id: main
            apex_config:
              tickAmount: 4
              decimalsInFloat: 0
          - id: sec
            apex_config:
              tickAmount: 1
            show: 
              false
        series:         
          - entity: binary_sensor.night
            transform: 'return x === "on" ? 1 : 0;'
            yaxis_id: sec
            color: grey
            type: area
            curve: stepline
            opacity: 0.5
            stroke_width: 0
            show:
              in_header: false
              name_in_header: false
            group_by:
              func: raw
          - entity: sensor.tobis_bedroom_temperature
            name: "Tobi's Bedroom"
            yaxis_id: main                  
          - entity: sensor.office_temperature
            name: 'Office'
            yaxis_id: main
          - entity: sensor.living_room_temperature
            name: 'Living Room'
