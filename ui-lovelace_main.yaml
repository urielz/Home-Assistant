title: Home
icon: 'mdi:home'
panel: true
badges: []
cards:

  # https://github.com/thomasloven/lovelace-layout-card
  - type: 'custom:layout-card'
    layout_type: vertical
    max_columns: 3 
    cards:

      #########################################################################
      # 1st Column
      #########################################################################

      # Weather Forecast Card -------------------------------------------------
      # https://www.home-assistant.io/lovelace/weather-forecast/
      - type: custom:mod-card
        card:
          type: weather-forecast
          name: Halifax
          entity: weather.bellevue
          secondary_info_attribute: wind_speed
          style: |
            .card-header {
              font-size: 9px;
              text-align: center;
              line-height: 0px;
            }
        card_mod:
          style: |
            ha-card {
              color: white;
              font-size: 11px;              
            }            

      # SONOS Media Player ----------------------------------------------------
      # https://github.com/kalkih/mini-media-player
      - type: custom:mini-media-player
        name: SONOS
        entity: media_player.speaker
        artwork: cover
        icon: mdi:music
        source: icon

      # Grid Panel with Switches ----------------------------------------------
      # https://www.home-assistant.io/lovelace/grid/
      - type: grid 
        columns: 3
        square: false
        cards:

          - type: 'custom:button-card'
            entity: switch.sonoff_frontdoor
            icon: mdi:lightbulb 
            color: rgb(255, 255, 102)
            name: Front Door
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 80px
            state:
              - value: 'on' 
                icon: bha:outdoor-lamp-variant
              - value: 'off'
                icon: bha:outdoor-lamp-variant

          - type: 'custom:button-card'
            entity: climate.heat_pump
            icon: mdi:air-conditioner
            color: rgb(255, 255, 102)
            name: Heat Pump
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 80px

          - type: 'custom:button-card'
            entity: switch.sonoff_humidifier
            icon: mdi:air-humidifier
            color: rgb(255, 255, 102)
            name: Humidifier
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 80px

          - type: 'custom:button-card'
            entity: switch.sonoff_freezer
            icon: 'mdi:fridge'
            color: rgb(255, 255, 102)
            name: Freezer
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 80px

          - type: 'custom:button-card'
            entity: switch.sonoff_fridge
            icon: 'mdi:fridge'
            color: rgb(255, 255, 102)
            name: Fridge
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 80px              

          - type: 'custom:button-card'
            entity: switch.sonoff_washer
            icon: mdi:washing-machine
            color: rgb(255, 255, 102)
            name: Washer
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 80px
            hold_action:
              action: more-info              

      #     - type: 'custom:button-card'
      #       entity: light.eb45e14e47084faddcsa7p
      #       icon: mdi:floor-lamp
      #       color: rgb(255, 255, 102)
      #       name: Basement
      #       show_state: true
      #       show_name: true
      #       styles:
      #         card:
      #         - font-size: 11px
      #         - height: 80px
      #       hold_action:
      #         action: more-info


      # Heat Pump Thermostat --------------------------------------------------
      # 
      - type: thermostat
        entity: climate.heat_pump
        name: Heat Pump
 
      - type: custom:layout-break
      
      # ######################################################################
      # # 2nd Column
      # ######################################################################
      
      # Office chart (T,P,RH,AH,TD,HI) -------------------------------------
      - type: custom:mod-card
        card:
          type: glance # https://www.home-assistant.io/lovelace/glance/
          title: Office
          style: |
            .card-header {
              font-size: 18px;
              text-align: center;
              line-height: 0px;
            }

          columns: 6
          entities:
            - entity: sensor.office_temperature
              name: Temp.
            - entity: sensor.office_heatindex
              name: Heat Index
            - entity: sensor.office_dewpoint
              name: Dew Point       
            - entity: sensor.office_humidity
              name: Humidity
            - entity: sensor.office_absolutehumidity             
              name: AH (ρv)
            - entity: sensor.office_pressure
              name: Pressure
        card_mod:
          style: |
            ha-card {
              color: white;
              font-size: 11px;              
            }

      # Tobi's Room chart (T,P,RH,AH,TD,HI) --------------------------------
      - type: custom:mod-card
        card:
          type: glance
          title: Tobi's Bedroom
          style: |
            .card-header {
              font-size: 18px;
              text-align: center;
              line-height: 0px;
            }             
          columns: 6
          entities:
            - entity: sensor.tobis_bedroom_temperature
              name: Temp.
            - entity: sensor.tobis_bedroom_heatindex
              name: Heat Index
            - entity: sensor.tobis_bedroom_dewpoint
              name: Dew Point
            - entity: sensor.tobis_bedroom_humidity
              name: Humidity
            - entity: sensor.tobis_bedroom_absolutehumidity
              name: AH (ρv)
            - entity: sensor.tobis_bedroom_pressure
              name: Pressure
        card_mod:
          style: |
            ha-card {
              color: white;
              font-size: 11px;
              #--ha-card-background: black;
            }
      
      # Game Room chart (T,P,RH,AH,TD,HI) -------------------------------------
      - type: custom:mod-card
        card:
          type: glance
          title: Game Room
          columns: 6 
          style: |
            .card-header {
              font-size: 18px;
              text-align: center;
              line-height: 0px;
            }
          entities:
            - entity: sensor.gameroom_temperature
              name: Temp.
            - entity: sensor.gameroom_heatindex
              name: Heat Index
            - entity: sensor.gameroom_dewpoint
              name: Dew Point
            - entity: sensor.gameroom_humidity
              name: Humidity
            - entity: sensor.gameroom_absolutehumidity
              name: AH (ρv)
            - entity: sensor.gameroom_pressure
              name: Pressure
        card_mod:
          style: |
            ha-card {
              color: white;
              font-size: 11px;
              #--ha-card-background: black;
            }

      # Living Room chart (T,P,RH,AH,TD,HI) --------------------------------
      - type: custom:mod-card
        card:
          type: glance
          title: Living Room
          columns: 6
          style: |
            .card-header {
              font-size: 18px;
              text-align: center;
              line-height: 0px;
            }
          entities:
            - entity: sensor.living_room_temperature
              name: Temp.
            - entity: sensor.living_room_heatindex
              name: Heat Index
            - entity: sensor.living_room_dewpoint
              name: Dew Point
            - entity: sensor.living_room_humidity
              name: Humidity
            - entity: sensor.living_room_absolutehumidity
              name: AH (ρv)
            - entity: sensor.living_room_pressure
              name: Pressure
        card_mod:
          style: |
            ha-card {
              color: white;
              font-size: 11px;
            }

      # Laundry Room chart (T,P,RH,AH,TD,HI) --------------------------------
      - type: custom:mod-card
        card:
          type: glance
          title: Laundry Room
          columns: 6
          style: |
            .card-header {
              font-size: 18px;
              text-align: center;
              line-height: 0px;
            }
          entities:
            - entity: sensor.laundry_room_temperature
              name: Temp.
            - entity: sensor.laundry_room_heatindex
              name: Heat Index
            - entity: sensor.laundry_room_dewpoint
              name: Dew Point
            - entity: sensor.laundry_room_humidity
              name: Humidity
            - entity: sensor.laundry_room_absolutehumidity
              name: AH (ρv)
            - entity: sensor.laundry_room_pressure
              name: Pressure
        card_mod:
          style: |
            ha-card {
              color: white;
              font-size: 11px;
            }              

      - type: custom:layout-break

      #########################################################################
      # 3rd Column
      #########################################################################

      - type: vertical-stack
        cards:

          # Basement Radon -------------------------------------
          - type: vertical-stack
            cards:
              - type: custom:apexcharts-card
                apex_config:
                  chart:
                    height: 220
                    zoom:
                      enabled: true
                    toolbar:
                      show: true
                      
                      # tools:
                      #   zoom: true
                      #   zoomin: true
                      #   zoomout: true
                      #   pan: true
                      #   reset: true                    
                  legend:
                    show: false
                  xaxis:
                    offsetY: 5
                  grid:
                    borderColor: '#90A4AE'
                    strokeDashArray: 2
                graph_span: 7d
                header:
                  show: true
                  show_states: true
                series:         
                  - entity: binary_sensor.night
                    transform: 'return x === "on" ? 80 : 0;'
                    color: grey
                    type: area
                    curve: stepline
                    opacity: 0.5
                    stroke_width: 0
                    show:
                      legend_value: false
                      in_header: false
                      name_in_header: false
                  - entity: sensor.airthings_basement_radonshorttermavg
                    name: Radon in Gameroom
                    stroke_width: 1.5
                    color: rgb(241,196,15)
                    type: area
                    opacity: 0.1
          
          # Temperature plot -----------------------------------------------
          - type: vertical-stack
            cards:
              - type: 'custom:mini-graph-card'
                name: Temperature
                icon: mdi:thermometer
                height: 150
                font_size: 75 
                hours_to_show: 72
                points_per_hour: 4
                line_width: 2
                cache: false
                show:
                  labels: false 
                  labels_secondary: false 
                entities:
                  - entity: sensor.temperature_mean
                    name: <T>                
                    color: rgba(241,196,15)
                  - entity: sensor.office_temperature 
                    name: Office
                    color: '#e74c3c' 
                  - entity: sensor.tobis_bedroom_temperature
                    name: Tobi's Room
                    color: '#aaffc3'
                  - entity: sensor.gameroom_temperature
                    name: Game Room 
                    color: '#ffd8b1'
                  - entity: sensor.living_room_temperature
                    name: Living Room 
                    color: rgba(106,90,205)
                  - entity: sensor.laundry_room_temperature
                    name: Laundry Room
                    color: rgba(255,255,255)
                  - entity: binary_sensor.night
                    color: rgba(255,255,255)                    
                    y_axis: secondary
                    show_state: false
                    show_legend: false
                    show_line: false
                    show_points: false
                state_map:
                  - value: 'off'
                    label: Day
                  - value: 'on'
                    label: Night

          # Temperature Anomaly plot ------------------------------------------
          - type: vertical-stack
            cards:
              - type: 'custom:mini-graph-card'
                name: Temperature Anomaly
                icon: mdi:thermometer
                height: 150
                font_size: 75
                hours_to_show: 72 
                points_per_hour: 4
                line_width: 2
                upper_bound: 5
                lower_bound: -5
                show:
                  labels: false 
                  labels_secondary: false 
                  state: false
                entities:
                  - entity: sensor.office_temperature_prime
                    name: Office
                    color: '#e74c3c' 
                  - entity: sensor.tobis_bedroom_temperature_prime
                    name: Tobi's Room
                    color: '#aaffc3'
                  - entity: sensor.gameroom_temperature_prime
                    name: Game Room 
                    color: '#ffd8b1'
                  - entity: sensor.living_room_temperature_prime
                    name: Living Room 
                    color: rgba(106,90,205)
                  - entity: sensor.laundry_room_temperature_prime
                    name: Laundry Room
                    color: rgba(255,255,255)
                  - entity: binary_sensor.night
                    color: rgba(255,255,255)
                    y_axis: secondary
                    show_state: false
                    show_legend: false
                    show_line: false
                    show_points: false
                state_map:
                  - value: "off"
                    label: "Day"
                  - value: "on"
                    label: "Night"
  
          # Relative Humidity plot -------------------------------------
          - type: vertical-stack
            cards:
              - type: 'custom:mini-graph-card'
                name: Relative Humidity
                icon: mdi:water-percent
                height: 150
                font_size: 75
                hours_to_show: 72 
                points_per_hour: 4
                line_width: 2
                show:
                  labels: false 
                  labels_secondary: false 
                entities:
                  - entity: sensor.humidity_mean
                    name: <RH>
                    color: rgba(241,196,15)
                  - entity: sensor.office_humidity
                    name: Office
                    color: '#e74c3c' 
                  - entity: sensor.tobis_bedroom_humidity
                    name: Tobi's Room
                    color: '#aaffc3'
                  - entity: sensor.gameroom_humidity
                    name: Game Room 
                    color: '#ffd8b1'
                  - entity: sensor.living_room_humidity
                    name: Living Room 
                    color: rgba(106,90,205)
                  - entity: sensor.laundry_room_humidity
                    name: Laundry Room
                    color: rgba(255,255,255)
                  - entity: binary_sensor.night
                    color: rgba(255,255,255)
                    y_axis: secondary
                    show_state: false
                    show_legend: false
                    show_line: false
                    show_points: false
                state_map:
                  - value: "off"
                    label: "Day"
                  - value: "on"
                    label: "Night"

          # Kitchen TVOC -------------------------------------
          - type: vertical-stack
            cards:
              - type: 'custom:mini-graph-card'
                name: 'Kitchen: Volatile Organic Compounds'
                icon: mdi:air-filter
                height: 150
                font_size: 75
                hours_to_show: 72 
                points_per_hour: 4
                line_width: 2
                show:
                  labels: false 
                  labels_secondary: false 
                entities:
                  - entity: sensor.airthings_kitchen_voc
                    name: VOC
                    color: rgba(241,196,15)
                  - entity: binary_sensor.night
                    color: rgba(255,255,255)
                    y_axis: secondary
                    show_state: false
                    show_legend: false
                    show_line: false
                    show_points: false
                state_map:
                  - value: "off"
                    label: "Day"
                  - value: "on"
                    label: "Night"