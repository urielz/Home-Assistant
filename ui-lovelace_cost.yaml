title: Electricity Cost
icon: 'mdi:currency-usd'
panel: true
badges: []
cards:

  # https://github.com/thomasloven/lovelace-layout-card
  - type: 'custom:layout-card'
    layout_type: vertical
    max_columns: 1
    cards:

      #########################################################################
      # 1st Column
      #########################################################################

      # Sonoff POWR2 @ Freezer ------------------------------------------------
      # https://github.com/custom-cards/button-card
      #
      - type: vertical-stack
        cards:
          - type: "custom:button-card" # Header
            name: Fridge
            styles:
              card:
                - height: 20px
                - -webkit-box-shadow: 0px 0px 1px 1px rgb(234,194,40,0.5)
                - box-shadow: 0px 0px 1px 1px rgb(234,194,40,0.5)
                - background-color: rgb(234,194,40,0.1)
                - font-size: 14px
      - type: vertical-stack
        cards:                
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                entity: sensor.fridge_monthly
                name: This month
                show_state: true
                size: 20%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card"
                entity: sensor.fridge_cost_monthly
                icon: mdi:currency-usd
                name: Monthly Cost
                show_state: true
                size: 20%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card"
                entity: sensor.fridge_cost_yearly
                icon: mdi:currency-usd
                name: Yearly Cost
                show_state: true
                size: 20%
                styles:
                  card:
                    - font-size: 12px

      # Sonoff POWR2 @ Freezer ------------------------------------------------
      # https://github.com/custom-cards/button-card
      #
      - type: vertical-stack
        cards:
          - type: "custom:button-card" # Header
            name: Washer
            styles:
              card:
                - height: 20px
                - -webkit-box-shadow: 0px 0px 1px 1px rgb(234,194,40,0.5)
                - box-shadow: 0px 0px 1px 1px rgb(234,194,40,0.5)
                - background-color: rgb(234,194,40,0.1)
                - font-size: 14px
      - type: vertical-stack
        cards:                
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                entity: sensor.washer_monthly
                name: This month
                show_state: true
                size: 20%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card"
                entity: sensor.washer_cost_monthly
                icon: mdi:currency-usd
                name: Monthly Cost
                show_state: true
                size: 20%
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card"
                entity: sensor.washer_cost_yearly
                icon: mdi:currency-usd
                name: Yearly Cost
                show_state: true
                size: 20%
                styles:
                  card:
                    - font-size: 12px