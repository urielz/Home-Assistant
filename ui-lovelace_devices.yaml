title: Devices
icon: 'mdi:home-automation'
panel: true
badges: []
cards:

  # 
  # https://github.com/thomasloven/lovelace-layout-card
  # 
  - type: 'custom:layout-card'
    layout_type: vertical
    max_columns: 3 
    cards:

      # .......................................................................
      # Column 1 
      # .......................................................................    

      # Grid Panel with Switches ----------------------------------------------
      # https://www.home-assistant.io/lovelace/grid/
      #
      - type: grid 
        columns: 3
        square: false
        cards:

          - type: 'custom:button-card'
            entity: switch.sonoff_frontdoor
            icon: mdi:lightbulb 
            color: rgb(255, 255, 102)
            name: Front Door
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px
            state:
              - value: 'on' 
                icon: bha:outdoor-lamp-variant
              - value: 'off'
                icon: bha:outdoor-lamp-variant

          - type: 'custom:button-card'
            entity: switch.sonoff_patio
            color: rgb(255, 255, 102)
            name: Patio String Lights
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px
            state:
              - value: 'on'
                icon: mdi:string-lights
              - value: 'off'
                icon: mdi:string-lights-off

          - type: 'custom:button-card'
            entity: light.guestroom_bedside
            icon: mdi:lamp
            color: rgb(255, 255, 102)
            name: Guestroom Bedside
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px                

          - type: 'custom:button-card'
            entity: switch.sonoff_humidifier
            icon: mdi:lamp
            color: rgb(255, 255, 102)
            name: Tobi's Light
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px            

          # placeholder
          - type: 'custom:button-card'
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px

          # placeholder
          - type: 'custom:button-card'
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 75px              

          - type: 'custom:button-card'
            entity: switch.sonoff_tv_plus
            icon: mdi:television
            color: rgb(255, 255, 102)
            name: Entertainment System
            label: > 
              [[[ return 'Power: ' + states['sensor.sonoff_tv_plus_power'].state + 'W'; ]]]
            show_state: false
            show_name: true
            show_label: true
            styles:
              card:
              - font-size: 11px
              - height: 100px

          - type: 'custom:button-card'
            entity: switch.sonoff_audio
            icon: mdi:music-clef-treble
            color: rgb(255, 255, 102)
            name: Audio System
            label: > 
              [[[ return 'Power: ' + states['sensor.sonoff_audio_power'].state + 'W'; ]]]
            show_state: false
            show_name: true
            show_label: true
            styles:
              card:
              - font-size: 11px
              - height: 100px              

          - type: 'custom:button-card'
            entity: climate.heat_pump
            icon: mdi:air-conditioner
            color: rgb(255, 255, 102)
            name: Heat Pump
            label: > 
              [[[ return 'Power: ' + states['sensor.atm90e32as_ct5_watts'].state + 'W'; ]]]
            show_state: false
            show_name: true
            show_label: true
            styles:
              card:
              - font-size: 11px
              - height: 100px

          - type: 'custom:button-card'
            entity: switch.sonoff_hvac
            icon: 'mdi:hvac'
            color: rgb(255, 255, 102)
            name: HVAC
            label: >
              [[[ return 'Power: ' + states['sensor.sonoff_hvac_power'].state + 'W'; ]]]
            show_state: false
            show_name: true
            show_label: true
            styles:
              card:
              - font-size: 11px
              - height: 100px

          - type: 'custom:button-card'
            entity: switch.sonoff_fridge
            icon: 'mdi:fridge'
            color: rgb(255, 255, 102)
            name: Fridge
            label: >
              [[[ return 'Power: ' + states['sensor.sonoff_fridge_power'].state + 'W'; ]]]
            show_state: false
            show_name: true
            show_label: true
            styles:
              card:
              - font-size: 11px
              - height: 100px              

          - type: 'custom:button-card'
            entity: switch.sonoff_washer
            icon: mdi:washing-machine
            color: rgb(255, 255, 102)
            name: Washer
            show_state: true
            show_name: true
            styles:
              card:
              - font-size: 11px
              - height: 100px
            hold_action:
              action: more-info              

      #     - type: 'custom:button-card'
      #       entity: light.eb45e14e47084faddcsa7p
      #       icon: mdi:floor-lamp
      #       color: rgb(255, 255, 102)
      #       name: Basement
      #       show_state: true
      #       show_name: true
      #       styles:
      #         card:
      #         - font-size: 11px
      #         - height: 80px
      #       hold_action:
      #         action: more-info

      - type: custom:layout-break

      # .......................................................................
      # Column 2 
      # .......................................................................      

      - type: vertical-stack
        cards:
          - type: custom:simple-thermostat
            entity: climate.heat_pump
            style: |
              ha-card {
                --st-font-size-xl: 22px;
                --st-font-size-m: 22px;
                --st-font-size-title: 22px;
                --st-font-size-sensors: 16px;
                --st-spacing: 4px;
              }
      - type: custom:layout-break

      # .......................................................................
      # Column 3 
      # .......................................................................      

      - type: vertical-stack
        cards:

          # SONOS Media Player ----------------------------------------------------
          # https://github.com/kalkih/mini-media-player
          #
          - type: custom:mini-media-player
            name: SONOS
            entity: media_player.speaker
            #artwork: cover
            icon: mdi:music
            source: icon
