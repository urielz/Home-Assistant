title: Hardware Status
icon: 'mdi:chip'
panel: true
badges: []
cards:

  # https://github.com/thomasloven/lovelace-layout-card
  - type: 'custom:layout-card'
    layout: vertical
    max_columns: 3 
    column_width: 200
    max_width: [40%, 40%, 20%]     
    cards:

      ######################################################################
      # 1st column
      ######################################################################

      - type: vertical-stack
        cards:
          # Printer Header
          - type: "custom:button-card" # https://github.com/custom-cards/button-card
            name: Office Printer 
            styles:
              card:
                - font-size: 16px
          - type: horizontal-stack
            cards:
              # Printer Status
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_status 
                icon: mdi:printer
                name: Status
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hl_l2340d_status'].state != 'sleep';
                      ]]]
                    color: rgb(46,204,64) # green
                  - operator: default
                    color: rgb(224, 224, 224) # gray
                styles:
                  card:
                    - font-size: 12px
              # Page Counter
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_page_counter 
                icon: mdi:stack-overflow
                name: Pages 
                show_state: true
                size: 30%
                state:
                  - operator: default
                    color: rgb(224, 224, 224) # gray
                styles:
                  card:
                    - font-size: 12px
              # Black Toner remaining
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_black_toner_remaining 
                icon: mdi:printer-3d-nozzle
                name: Black Toner
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hl_l2340d_black_toner_remaining'].state < 20;
                      ]]]
                    color: rgb(255,65,54) # red                
                  - operator: default
                    color: rgb(46, 204, 64) # green
                styles:
                  card:
                    - font-size: 12px
              # Drum Remaining Life     
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_drum_remaining_life 
                icon: mdi:chart-donut
                name: Drum Life
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hl_l2340d_drum_remaining_life'].state < 20;
                      ]]]
                    color: rgb(255,65,54) # red                
                  - operator: default
                    color: rgb(46, 204, 64) # green
                styles:
                  card:
                    - font-size: 12px                       

      ######################################################################
      # 2nd column
      ######################################################################

      - type: vertical-stack
        cards:
          # Row 1: Tag
          - type: "custom:button-card" # https://github.com/custom-cards/button-card
            name: Kuroshio NAS - Synology DS216se
            entity: sensor.kuroshio_last_boot
            show_icon: false
            show_state: false 
            styles:
              card:
                - font-size: 16px

          # Row 2: Overall Status
          - type: horizontal-stack
            cards:
              - type: "custom:button-card" # https://github.com/custom-cards/button-card
                name: HDD 1 Status
                entity: sensor.kuroshio_drive_1_status
                icon: mdi:harddisk
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.kuroshio_drive_1_status'].state != 'normal';
                      ]]]
                    color: rgb(255,65,54) # red
                  - operator: default
                    color: rgb(46, 204, 64) # green
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # https://github.com/custom-cards/button-card
                entity: sensor.kuroshio_drive_2_status
                name: HDD 2 Status
                icon: mdi:harddisk
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.kuroshio_drive_2_status'].state != 'normal';
                      ]]]
                    color: rgb(255,65,54)
                  - operator: default
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # https://github.com/custom-cards/button-card
                entity: binary_sensor.kuroshio_update_available
                name: Operating System
                icon: mdi:nas
                show_state: false
                show_label: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['binary_sensor.kuroshio_update_available'].state == 'On';
                      ]]]
                    color: rgb(46, 204, 64)
                    label: update available
                  - operator: default
                    color: rgb(46, 204, 64)
                    label: no pending updates
                styles:
                  card:
                    - font-size: 12px

          # Row 3: Main Gauges
          - cards:             
              - type: gauge # https://www.home-assistant.io/lovelace/gauge/
                name: CPU              
                entity: sensor.kuroshio_cpu_utilization_total
                min: 0
                max: 100
                severity:
                  green: 0
                  red: 80
                  yellow: 50
              - type: gauge # https://www.home-assistant.io/lovelace/gauge/
                name: Memory
                entity: sensor.kuroshio_memory_usage_real
                min: 0
                max: 100
                severity:
                  green: 0
                  red: 90
                  yellow: 70
              - type: gauge # https://www.home-assistant.io/lovelace/gauge/
                name: Storage
                entity: sensor.kuroshio_volume_1_volume_used
                min: 0
                max: 100
                severity:
                  green: 0
                  red: 90
                  yellow: 80
            type: horizontal-stack

          # Row 4: Network Traffic
          - cards:
              - type: 'custom:mini-graph-card' # https://github.com/kalkih/mini-graph-card
                name: Down
                icon: mdi:download-network
                font_size: 70
                entities:
                  - entity: sensor.kuroshio_network_down
                hours_to_show: 12
                points_per_hour: 10
                line_color: '#0074D9'
                line_width: 3
              - type: 'custom:mini-graph-card' # https://github.com/kalkih/mini-graph-card
                name: Up
                icon: mdi:upload-network
                font_size: 70
                entities:
                  - entity: sensor.kuroshio_network_up
                hours_to_show: 12
                points_per_hour: 10
                line_color: '#FF4136'
                line_width: 3
            type: horizontal-stack

          # Row 5: Temp and Free Space
          - cards:
              - type: custom:mini-graph-card # https://github.com/kalkih/mini-graph-card
                entities:
                  - entity: sensor.kuroshio_free_space
                name: Free space
                show:
                  graph: bar
                hours_to_show: 12
                points_per_hour: 1
                line_color: '#FF851B'
                font_size: 70
              - type: custom:mini-graph-card # https://github.com/kalkih/mini-graph-card
                name: CPU
                icon: mdi:thermometer
                entities:
                  - entity: sensor.kuroshio_temperature
                hours_to_show: 12
                points_per_hour: 10
                line_color: '#B10DC9'
                line_width: 3
                font_size: 70
              - type: custom:mini-graph-card # https://github.com/kalkih/mini-graph-card
                name: System
                icon: mdi:thermometer
                entities:
                  - entity: sensor.kuroshio_volume_1_average_disk_temp
                hours_to_show: 12
                points_per_hour: 10
                line_color: '#39CCCC'
                line_width: 3
                font_size: 70
            type: horizontal-stack

      ######################################################################
      # 3rd column
      ######################################################################

      - type: vertical-stack
        cards:
          # Row 1: Tag
          - type: "custom:button-card" # https://github.com/custom-cards/button-card
            name: HASS Container
            styles:
              card:
                - font-size: 16px
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                entity: sensor.local_version
                icon: mdi:home-assistant
                name: Local Version
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.local_version'].state != states['sensor.latest_version'].state;
                      ]]]
                    color: rgb(255,65,54)
                  - operator: default
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px                
              - type: "custom:button-card"
                icon: mdi:git
                entity: sensor.latest_version
                name: Latest Version
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states["sensor.latest_version"].state
                      ]]]
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card"
                entity: sensor.hacs
                name: HACS
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hacs'].state > 0;
                      ]]]
                    color: rgb(255,65,54)
                  - operator: default
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px                    
