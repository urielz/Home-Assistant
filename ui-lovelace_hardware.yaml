title: Devices Status
icon: 'mdi:chip'
panel: true
badges: []
cards:

  - type: 'custom:layout-card' # https://github.com/thomasloven/lovelace-layout-card
    layout: vertical
    max_columns: 3
    column_width: 200
    max_width: [40%, 40%, 20%]
    cards:

      ######################################################################
      # 1st column
      ######################################################################
      # RPI4, Office Printer

      - type: vertical-stack
        cards:

          # RPI4
          - type: 'custom:rpi-monitor-card'
            entity: sensor.rpi_monitor_rpi4
            name: Raspberry Pi 4
            card_style: full
            temp_scale: C
            fs_severity:
              - color: Green
                from: 0
                to: 25
              - color: Orange
                from: 26
                to: 50
              - color: Red
                from: 51
                to: 100

          # Printer Header
          - type: "custom:button-card" # https://github.com/custom-cards/button-card
            name: Office Printer 
            styles:
              card:
                - font-size: 16px
          - type: horizontal-stack
            cards:
              # Printer Status
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_status 
                icon: mdi:printer
                name: Status
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hl_l2340d_status'].state != 'sleep';
                      ]]]
                    color: rgb(46,204,64) # green
                  - operator: default
                    color: rgb(224, 224, 224) # gray
                styles:
                  card:
                    - font-size: 12px
              # Page Counter
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_page_counter 
                icon: mdi:stack-overflow
                name: Pages 
                show_state: true
                size: 30%
                state:
                  - operator: default
                    color: rgb(224, 224, 224) # gray
                styles:
                  card:
                    - font-size: 12px
              # Black Toner remaining
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_black_toner_remaining 
                icon: mdi:printer-3d-nozzle
                name: Black Toner
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hl_l2340d_black_toner_remaining'].state < 20;
                      ]]]
                    color: rgb(255,65,54) # red                
                  - operator: default
                    color: rgb(46, 204, 64) # green
                styles:
                  card:
                    - font-size: 12px
              # Drum Remaining Life     
              - type: "custom:button-card" #  https://github.com/custom-cards/button-card
                entity: sensor.hl_l2340d_drum_remaining_life 
                icon: mdi:chart-donut
                name: Drum Life
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hl_l2340d_drum_remaining_life'].state < 20;
                      ]]]
                    color: rgb(255,65,54) # red                
                  - operator: default
                    color: rgb(46, 204, 64) # green
                styles:
                  card:
                    - font-size: 12px                       

      ######################################################################
      # 2nd column
      ######################################################################
      # Kuroshio NAS

      - type: vertical-stack
        cards:
          # Row 1: NAS Header
          - type: "custom:button-card" # https://github.com/custom-cards/button-card
            name: Kuroshio NAS - Synology DS216se
            entity: sensor.kuroshio_last_boot
            show_icon: false
            show_state: false 
            styles:
              card:
                - font-size: 16px

          # Row 2: Overall Status
          - type: horizontal-stack
            cards:
              - type: "custom:button-card" # https://github.com/custom-cards/button-card
                name: Free Space
                entity: sensor.kuroshio_free_space
                icon: mdi:harddisk-plus
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.kuroshio_free_space'].state < 500;
                      ]]]
                    color: rgb(255,65,54) # red
                  - operator: default
                    color: rgb(46, 204, 64) # green
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # https://github.com/custom-cards/button-card
                name: HDD 1 Status
                entity: sensor.kuroshio_drive_1_status
                icon: mdi:harddisk
                show_state: true
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.kuroshio_drive_1_status'].state != 'normal';
                      ]]]
                    color: rgb(255,65,54) # red
                  - operator: default
                    color: rgb(46, 204, 64) # green
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # https://github.com/custom-cards/button-card
                entity: sensor.kuroshio_drive_2_status
                name: HDD 2 Status
                icon: mdi:harddisk
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.kuroshio_drive_2_status'].state != 'normal';
                      ]]]
                    color: rgb(255,65,54)
                  - operator: default
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card" # https://github.com/custom-cards/button-card
                entity: binary_sensor.kuroshio_update_available
                name: Op. System
                icon: mdi:nas
                show_state: false
                show_label: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['binary_sensor.kuroshio_update_available'].state == 'On';
                      ]]]
                    color: rgb(46, 204, 64)
                    label: update available
                  - operator: default
                    color: rgb(46, 204, 64)
                    label: no updates
                styles:
                  card:
                    - font-size: 12px

          # Row 3: Main Gauges
          - cards:             
              - type: gauge # https://www.home-assistant.io/lovelace/gauge/
                name: CPU              
                entity: sensor.kuroshio_cpu_utilization_total
                min: 0
                max: 100
                severity:
                  green: 0
                  red: 80
                  yellow: 50
              - type: gauge # https://www.home-assistant.io/lovelace/gauge/
                name: Memory
                entity: sensor.kuroshio_memory_usage_real
                min: 0
                max: 100
                severity:
                  green: 0
                  red: 90
                  yellow: 70
              - type: gauge # https://www.home-assistant.io/lovelace/gauge/
                name: Storage
                entity: sensor.kuroshio_volume_1_volume_used
                min: 0
                max: 100
                severity:
                  green: 0
                  red: 90
                  yellow: 80
            type: horizontal-stack

          # Row 4: Plot of NAS Traffic
          - cards:
              - type: custom:apexcharts-card # https://github.com/RomRider/apexcharts-card
                apex_config: # see: https://apexcharts.com/docs
                  chart:
                    height: 170
                  legend:
                    show: false
                  xaxis:
                    offsetY: 5
                  grid:
                    borderColor: '#90A4AE'
                    strokeDashArray: 2
                    xaxis: {
                      lines: {
                        show: true
                      }
                    }  
                graph_span: 7d
                all_series_config:
                  stroke_width: 1
                  opacity: 0.8
                  transform: return x / 1024;
                  unit: Mb/s
                header:
                  title: NAS Local Network Traffic                  
                  show: true
                  show_states: true
                  colorize_states: true
                series:
                  - entity: sensor.kuroshio_network_down
                    name: In
                    color: rgb(204,0,0)
                    curve: smooth
                    type: area
                    invert: true
                  - entity: sensor.kuroshio_network_up
                    name: Out
                    color: rgb(0,102,204)
                    curve: smooth
                    type: area
            type: horizontal-stack

          # CPU and HDD Temperature -------------------------------------------
          - cards:
              - type: custom:apexcharts-card
                apex_config:
                  chart:
                    height: 220
                  legend:
                    show: 
                      false
                  grid:
                    borderColor: '#90A4AE'
                    strokeDashArray: 2
                    # xaxis: {
                    #   lines: {
                    #     show: true
                    #   }
                    # }
                header:
                  show: true
                  show_states: true
                  colorize_states: true
                  title: CPU and HDD Temperature
                yaxis:
                  - id: main
                    apex_config:
                      tickAmount: 3
                      decimalsInFloat: 0
                  - id: sec
                    apex_config:
                      tickAmount: 1
                    show:
                      false
                graph_span: 7d
                all_series_config:
                  curve: smooth
                  stroke_width: 1.5
                  show:
                    legend_value: false
                  group_by:
                    func: avg
                    duration: 60min
                series:
                  - entity: binary_sensor.night
                    transform: 'return x === "on" ? 1 : 0;'
                    color: grey
                    type: area
                    curve: stepline
                    opacity: 0.5
                    stroke_width: 0
                    yaxis_id: sec
                    show:
                      legend_value: false
                      in_header: false
                      name_in_header: false
                  - entity: sensor.kuroshio_temperature
                    name: CPU
                    #color: rgb(204,0,0)
                    yaxis_id: main
                  - entity: sensor.kuroshio_drive_1_temperature
                    name: Drive 1
                    #color: rgb(0,204,102)
                    yaxis_id: main            
                  - entity: sensor.kuroshio_drive_2_temperature
                    name: Drive 2
                    #color: rgb(204,204,0)
                    yaxis_id: main
                style: |
                  ha-card {
                       font-size: 12px;

                       # leaving this here for reference:
                       #--ha-card-background: rgba(0, 0, 0, 0);
                       #box-shadow: none;
                       #margin: 8px 8px 18px 8px;
                       #text-align: center;
                       #font-weight: 250;
                       #font-family: Segoe Ui Light;
                     }
                     div#header__title {
                       font-size: 16px;
                     }                    
            type: horizontal-stack

      ######################################################################
      # 3rd column
      ######################################################################
      # HASS

      - type: vertical-stack
        cards:
        # type: horizontal-stack        
          # Row 1: Tag
          - type: "custom:button-card" # https://github.com/custom-cards/button-card
            name: HASS Container
            styles:
              card:
                - font-size: 16px
          - type: "custom:button-card"
            name: HASS Service Restart
            icon: mdi:restart
            size: 20%
            tap_action:
              action: call-service
              service: homeassistant.restart
            styles:
              card:
                - font-size: 12px
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                entity: sensor.local_version
                icon: mdi:home-assistant
                name: Local Version
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.local_version'].state != states['sensor.latest_version'].state;
                      ]]]
                    color: rgb(255,65,54)
                  - operator: default
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px                
              - type: "custom:button-card"
                icon: mdi:git
                entity: sensor.latest_version
                name: Latest Version
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states["sensor.latest_version"].state
                      ]]]
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px
              - type: "custom:button-card"
                entity: sensor.hacs
                name: Updates
                show_state: true
                color: rgb(68,115,158)
                size: 30%
                state:
                  - operator: template
                    value: >
                      [[[
                        return states['sensor.hacs'].state > 0;
                      ]]]
                    color: rgb(255,65,54)
                  - operator: default
                    color: rgb(46, 204, 64)
                styles:
                  card:
                    - font-size: 12px
              # - type: "custom:button-card"
              #   entity: sensor.potential_breaking_changes
              #   name: Pot. Breaking
              #   show_state: true
              #   size: 30%
              #   state:
              #     - operator: '!='
              #       value: 0
              #       color: rgb(255,65,54)
              #     - operator: default
              #       value: 0
              #       color: rgb(46, 204, 64)
